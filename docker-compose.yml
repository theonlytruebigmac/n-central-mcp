services:
  ncentral-mcp:
    build: .
    container_name: nc-mcp-server
    ports:
      - "3100:3100"
    environment:
      - NC_SERVER_URL=${NC_SERVER_URL}
      - NC_JWT_TOKEN=${NC_JWT_TOKEN}
      - NC_WRITE_MODE=${NC_WRITE_MODE:-write}
      - MCP_PORT=3100
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_CORS_ORIGIN=${MCP_CORS_ORIGIN:-}
      - MCP_BIND_ADDRESS=0.0.0.0
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
